<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Viktor-X 台股訊號系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{
    --bg:#0a0e1a;--surface:#111827;--surface2:#1a2234;--border:#1e2d45;
    --accent:#3b82f6;--accent-glow:rgba(59,130,246,0.15);
    --green:#10b981;--green-dim:rgba(16,185,129,0.12);
    --red:#ef4444;--hot:#f59e0b;--hot-dim:rgba(245,158,11,0.12);
    --text:#e2e8f0;--text-dim:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:60px;}
  header{border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;background:var(--surface);position:sticky;top:0;z-index:10;}
  .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 2s infinite;flex-shrink:0;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  header h1{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:.08em;}
  header h1 span{color:var(--accent);}
  .header-right{margin-left:auto;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
  .container{max-width:1140px;margin:0 auto;padding:16px 12px 0;}
  .controls{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .ctrl-label{font-size:11px;color:var(--text-dim);letter-spacing:.05em;text-transform:uppercase;}
  select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:13px;cursor:pointer;outline:none;max-width:160px;}
  select:focus{border-color:var(--accent);}
  .signal-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);}
  .signal-count strong{color:var(--green);font-size:16px;margin-right:2px;}
  .hot-section{margin-bottom:16px;}
  .hot-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
  .hot-title{font-size:13px;font-weight:600;color:var(--hot);}
  .hot-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--hot-dim);color:var(--hot);font-family:'JetBrains Mono',monospace;}
  .hot-desc{font-size:10px;color:var(--text-dim);}
  .hot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
  .hot-card{background:var(--surface);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:10px 12px;cursor:pointer;position:relative;overflow:hidden;}
  .hot-card:active{border-color:var(--hot);}
  .hot-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--hot),transparent);}
  .hot-card-code{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--hot);}
  .hot-card-name{font-size:11px;color:var(--text);margin:2px 0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hot-card-row{display:flex;justify-content:space-between;align-items:center;gap:4px;}
  .hot-card-price{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--green);}
  .hot-card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px;}
  .hot-tag{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--hot-dim);color:var(--hot);}
  .detail-panel{display:none;background:var(--surface2);border-top:1px solid var(--border);padding:12px;animation:fadeIn .15s;}
  .detail-panel.open{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;}
  @media(max-width:600px){.detail-grid{grid-template-columns:1fr;}}
  .detail-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
  .detail-box-title{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin-bottom:6px;}
  .chip-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
  .chip-label{font-size:12px;color:var(--text-dim);}
  .chip-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;}
  .chip-val.buy{color:var(--green);}.chip-val.sell{color:var(--red);}
  .trend-row{display:flex;gap:3px;align-items:flex-end;height:36px;margin-top:4px;}
  .trend-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;}
  .trend-label{display:flex;justify-content:space-between;font-size:9px;color:var(--text-dim);margin-top:2px;}
  .rsi-hot{background:rgba(239,68,68,.15);color:#ef4444;}
  .rsi-ok{background:rgba(16,185,129,.12);color:#10b981;}
  .rsi-cold{background:rgba(100,116,139,.15);color:#94a3b8;}
  .adx-strong{background:rgba(59,130,246,.15);color:#3b82f6;}
  .adx-mid{background:rgba(245,158,11,.15);color:#f59e0b;}
  .adx-weak{background:rgba(100,116,139,.15);color:#94a3b8;}
  .search-bar{width:100%;margin-bottom:12px;}
  .search-bar input{width:100%;padding:9px 14px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:14px;outline:none;}
  .search-bar input:focus{border-color:var(--accent);}
  .search-bar input::placeholder{color:var(--text-dim);}
  .view-toggle{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .toggle-btn{padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .toggle-btn.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent);}
  .category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
  @media(max-width:600px){.category-grid{grid-template-columns:1fr;}}
  .category-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .category-header{padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .category-name{font-size:12px;font-weight:600;color:var(--text);}
  .category-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:20px;background:var(--green-dim);color:var(--green);}
  .stock-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:6px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .stock-row:last-of-type{border-bottom:none;}
  .stock-row:active,.stock-row:hover{background:var(--surface2);}
  .stock-row.is-hot{background:rgba(245,158,11,0.04);}
  .stock-code{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--accent);width:40px;flex-shrink:0;}
  .stock-name{font-size:13px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .stock-price{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--green);flex-shrink:0;}
  .stock-change{font-family:'JetBrains Mono',monospace;font-size:11px;flex-shrink:0;width:56px;text-align:right;}
  .rsi-pill{font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 5px;border-radius:3px;flex-shrink:0;}
  .score-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 6px;border-radius:20px;font-weight:600;flex-shrink:0;}
  .score-hot{background:rgba(239,68,68,.15);color:#ef4444;}
  .score-mid{background:rgba(245,158,11,.15);color:#f59e0b;}
  .score-low{background:rgba(100,116,139,.15);color:#94a3b8;}
  .expand-arrow{font-size:10px;color:var(--text-dim);flex-shrink:0;transition:transform .2s;}
  .expand-arrow.open{transform:rotate(180deg);}
  .up{color:var(--green);}.dn{color:var(--red);}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow-x:auto;}
  table{width:100%;border-collapse:collapse;min-width:480px;}
  thead th{padding:9px 12px;text-align:left;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);background:var(--surface2);border-bottom:1px solid var(--border);font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;}
  tbody tr{border-bottom:1px solid var(--border);cursor:pointer;}
  tbody tr:hover{background:var(--surface2);}
  tbody tr.is-hot{background:rgba(245,158,11,0.04);}
  tbody td{padding:9px 12px;font-size:12px;}
  td.code{font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:600;}
  td.price{font-family:'JetBrains Mono',monospace;color:var(--green);}
  td.chg{font-family:'JetBrains Mono',monospace;}
  .state-box{text-align:center;padding:48px 20px;color:var(--text-dim);font-size:14px;}
  .state-box .icon{font-size:32px;margin-bottom:12px;}
  a.tv-link{color:var(--accent);text-decoration:none;}
  .divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
</style>
</head>

function miniBar(vals,color,minV,maxV){
  if(!vals||!vals.length)return '';
  const range=maxV-minV||1;
  return vals.map((v,i)=>{
    if(v===null||v===undefined)return `<div class="trend-bar" style="background:var(--border)"></div>`;
    const h=Math.max(3,Math.round(((v-minV)/range)*32));
    return `<div class="trend-bar" style="height:${h}px;background:${color};opacity:${0.4+i/vals.length*0.6}" title="${v}"></div>`;
  }).join('');
}
function buildDetailPanel(d){
  if(!d||!d.dates||!d.dates.length)return '<div style="padding:12px;color:var(--text-dim);font-size:12px;">無詳細資料</div>';
  const rsiVals=d.rsi.filter(v=>v!==null&&v!==undefined);
  const adxVals=d.adx.filter(v=>v!==null&&v!==undefined);
  const rsiMin=Math.min(...rsiVals), rsiMax=Math.max(...rsiVals);
  const adxMin=Math.min(...adxVals), adxMax=Math.max(...adxVals);
  const fv=d.foreign||0, tv=d.trust||0;
  const lastRsi=d.rsi[d.rsi.length-1];
  const lastAdx=d.adx[d.adx.length-1];
  const rsiNote=lastRsi>=70?'超買注意拉回':lastRsi<=30?'超賣可能反彈':lastRsi>=50?'多方占優':'偏弱';
  const adxNote=lastAdx>=25?'趨勢強動能足':lastAdx>=20?'趨勢成形中':'趨勢弱';
  const rsiColor=lastRsi>=70?'#ef4444':lastRsi<=30?'#94a3b8':'#10b981';
  const adxColor=lastAdx>=25?'#3b82f6':lastAdx>=20?'#f59e0b':'#64748b';
  const chipNote=fv>0&&tv>0?'✅ 外資＋投信同步買超':fv>0?'📌 外資買超':tv>0?'📌 投信買超':'⚠️ 無法人買超';
  return `
  <div class="detail-grid">
    <div class="detail-box">
      <div class="detail-box-title">📊 RSI 14 — ${rsiNote}</div>
      <div style="font-size:22px;font-weight:600;color:${rsiColor};margin-bottom:4px;">${lastRsi}</div>
      <div class="trend-row">${miniBar(d.rsi,'#3b82f6',rsiMin,rsiMax)}</div>
      <div class="trend-label"><span>${d.dates[0]}</span><span>${d.dates[d.dates.length-1]}</span></div>
    </div>
    <div class="detail-box">
      <div class="detail-box-title">📈 ADX 14 — ${adxNote}</div>
      <div style="font-size:22px;font-weight:600;color:${adxColor};margin-bottom:4px;">${lastAdx}</div>
      <div class="trend-row">${miniBar(d.adx,'#f59e0b',adxMin,adxMax)}</div>
      <div class="trend-label"><span>${d.dates[0]}</span><span>${d.dates[d.dates.length-1]}</span></div>
    </div>
    <div class="detail-box">
      <div class="detail-box-title">🏦 籌碼（當日）</div>
      <div class="chip-row">
        <span class="chip-label">外資</span>
        <span class="chip-val ${fv>0?'buy':'sell'}">${fmtChip(fv)}</span>
      </div>
      <div class="chip-row">
        <span class="chip-label">投信</span>
        <span class="chip-val ${tv>0?'buy':'sell'}">${fmtChip(tv)}</span>
      </div>
      <div style="margin-top:8px;font-size:10px;color:var(--text-dim);">${chipNote}</div>
    </div>
  </div>`;
}

function toggleDetail(uid){
  const s=stockMap[uid];
  const panel=document.getElementById('dp-'+uid);
  const arrow=document.getElementById('arrow-'+uid);
  if(!panel||!s)return;
  if(panel.classList.contains('open')){
    panel.classList.remove('open');
    if(arrow)arrow.classList.remove('open');
  } else {
    if(!panel.innerHTML.trim())panel.innerHTML=buildDetailPanel(s.detail);
    panel.classList.add('open');
    if(arrow)arrow.classList.add('open');
  }
}
function toggleTableDetail(uid){
  const s=stockMap[uid];
  const tr=document.getElementById('tbl-tr-'+uid);
  const panel=document.getElementById('dp-'+uid);
  if(!tr||!s)return;
  if(tr.style.display!=='none'){tr.style.display='none';}
  else{if(!panel.innerHTML.trim())panel.innerHTML=buildDetailPanel(s.detail);tr.style.display='';}
}
function getFiltered(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  if(!q)return currentData;
  return currentData.filter(s=>s.code.toLowerCase().includes(q)||s.name.toLowerCase().includes(q));
}
function renderHotSection(){
  const hotStocks=currentData.filter(s=>s.hot);
  const sec=document.getElementById('hotSection'), div=document.getElementById('hotDivider');
  if(!hotStocks.length){sec.style.display='none';div.style.display='none';return;}
  sec.style.display='';div.style.display='';
  document.getElementById('hotCount').textContent=hotStocks.length+' 支';
  document.getElementById('hotGrid').innerHTML=hotStocks.map((s,i)=>{
    const uid='hot'+i; reg(uid,s);
    return `<div class="hot-card" onclick="toggleDetail('${uid}')">
      <div class="hot-card-code">${s.code}</div>
      <div class="hot-card-name">${s.name}</div>
      <div class="hot-card-row">
        <span class="hot-card-price">${s.price.toFixed(1)}</span>
        ${chgHtml(s.change)}
        ${scoreBadge(s.score)}
      </div>
      <div class="hot-card-tags">
        <span class="hot-tag">爆量≥2x</span><span class="hot-tag">突破高點</span>
        <span class="hot-tag">評分≥75</span>
      </div>
      <div class="detail-panel" id="dp-${uid}"></div>
    </div>`;
  }).join('');
}
function init(){
  const dates=Object.keys(ALL_DATA).sort((a,b)=>b.localeCompare(a));
  document.getElementById('dateSelect').innerHTML=dates.map(d=>`<option value="${d}">${d}</option>`).join('');
  document.getElementById('lastUpdate').textContent=dates[0];
  loadDate();
}
function loadDate(){
  document.getElementById('searchInput').value='';
  const date=document.getElementById('dateSelect').value;
  currentData=ALL_DATA[date]||[];
  if(!currentData.length){
    document.getElementById('mainContent').innerHTML='<div class="state-box"><div class="icon">📭</div>當日無訊號</div>';
    document.getElementById('signalCount').innerHTML='<span style="color:var(--text-dim)">無訊號</span>';
    document.getElementById('hotSection').style.display='none';
    document.getElementById('hotDivider').style.display='none';
    return;
  }
  currentData.sort((a,b)=>b.score-a.score);
  const hotCount=currentData.filter(s=>s.hot).length;
  document.getElementById('signalCount').innerHTML=`共 <strong>${currentData.length}</strong> 支${hotCount?` · <span style="color:var(--hot)">⚡${hotCount}</span>`:''}`;
  renderHotSection();
  renderView();
}
function setView(v){
  currentView=v;
  ['price','industry','table'].forEach(k=>document.getElementById('btn-'+k).classList.toggle('active',k===v));
  if(currentData.length)renderView();
}
function renderView(){
  if(currentView==='price')renderByPrice();
  else if(currentView==='industry')renderByIndustry();
  else renderTable();
}
function stockRowHtml(s,uid){
  reg(uid,s);
  return `<div class="stock-row${s.hot?' is-hot':''}" onclick="toggleDetail('${uid}')">
    <span class="stock-code"><a class="tv-link" href="https://www.tradingview.com/chart/?symbol=TWSE:${s.code}" target="_blank" onclick="event.stopPropagation()">${s.code}</a></span>
    <span class="stock-name">${s.hot?'⚡':''}${s.name}</span>
    <span class="stock-price">${s.price.toFixed(1)}</span>
    <span class="stock-change">${chgHtml(s.change)}</span>
    ${rsiPill(s.rsi)}
    ${scoreBadge(s.score)}
    <span class="expand-arrow" id="arrow-${uid}">▾</span>
  </div>
  <div class="detail-panel" id="dp-${uid}"></div>`;
}
function renderByPrice(){
  const data=getFiltered();
  const groups=PRICE_RANGES.map(r=>({...r,stocks:data.filter(s=>s.price>=r.min&&s.price<r.max)})).filter(g=>g.stocks.length);
  if(!groups.length){document.getElementById('mainContent').innerHTML='<div class="state-box"><div class="icon">🔍</div>找不到股票</div>';return;}
  document.getElementById('mainContent').innerHTML='<div class="category-grid">'+groups.map(g=>
    `<div class="category-card">
      <div class="category-header"><span class="category-name">${g.label}</span><span class="category-badge">${g.stocks.length} 支</span></div>
      ${g.stocks.map((s,i)=>stockRowHtml(s,`pr_${g.min}_${i}`)).join('')}
    </div>`).join('')+'</div>';
}
function renderByIndustry(){
  const data=getFiltered();
  const map={};
  data.forEach(s=>{const ind=s.industry||'未分類';if(!map[ind])map[ind]=[];map[ind].push(s);});
  const groups=Object.entries(map).sort((a,b)=>b[1].length-a[1].length);
  if(!groups.length){document.getElementById('mainContent').innerHTML='<div class="state-box"><div class="icon">🔍</div>找不到股票</div>';return;}
  document.getElementById('mainContent').innerHTML='<div class="category-grid">'+groups.map(([ind,stocks])=>
    `<div class="category-card">
      <div class="category-header"><span class="category-name">${ind}</span><span class="category-badge">${stocks.length} 支</span></div>
      ${stocks.map((s,i)=>stockRowHtml(s,`ind_${ind.replace(/[^a-zA-Z0-9]/g,'_')}_${i}`)).join('')}
    </div>`).join('')+'</div>';
}
function renderTable(){
  const data=getFiltered();
  if(!data.length){document.getElementById('mainContent').innerHTML='<div class="state-box"><div class="icon">🔍</div>找不到股票</div>';return;}
  const cols=[
    {key:'code',label:'代號'},{key:'name',label:'名稱'},{key:'price',label:'收盤'},
    {key:'change',label:'漲跌%'},{key:'rsi',label:'RSI'},{key:'adx',label:'ADX'},{key:'score',label:'評分'},
  ];
  const sorted=[...data].sort((a,b)=>{const v=a[sortCol]<b[sortCol]?-1:a[sortCol]>b[sortCol]?1:0;return sortAsc?v:-v;});
  document.getElementById('mainContent').innerHTML=
    '<div class="table-wrap"><table><thead><tr>'+
    cols.map(c=>`<th onclick="sortBy('${c.key}')">${c.label}${sortCol===c.key?(sortAsc?' ▲':' ▼'):''}</th>`).join('')+
    '</tr></thead><tbody>'+
    sorted.map((s,i)=>{
      const uid=`tbl_${i}`; reg(uid,s);
      return `<tr class="${s.hot?'is-hot':''}" onclick="toggleTableDetail('${uid}')">
        <td class="code"><a class="tv-link" href="https://www.tradingview.com/chart/?symbol=TWSE:${s.code}" target="_blank" onclick="event.stopPropagation()">${s.code}${s.hot?' ⚡':''}</a></td>
        <td>${s.name}</td>
        <td class="price">${s.price.toFixed(1)}</td>
        <td class="chg">${chgHtml(s.change)}</td>
        <td>${rsiPill(s.rsi)}</td>
        <td>${adxPill(s.adx)}</td>
        <td>${scoreBadge(s.score)}</td>
      </tr>
      <tr id="tbl-tr-${uid}" style="display:none"><td colspan="7" style="padding:0">
        <div class="detail-panel open" id="dp-${uid}"></div>
      </td></tr>`;
    }).join('')+
    '</tbody></table></div>';
}
window.sortBy=function(col){
  if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=false;}
  renderTable();
};
init();
</script>
</body>
</html>
