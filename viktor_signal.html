function row(s,i){const id=idOf(s,i);return `<div class="row ${s.hot?'hot-row':''}" data-id="${id}"><span class="code"><a class="tv" target="_blank" href="https://www.tradingview.com/chart/?symbol=TWSE:${esc(s.code)}">${esc(s.code)}</a></span><span class="name">${s.hot?'⚡ ':''}${esc(s.name)}</span><span class="price">${Number(s.price).toFixed(2)}</span><span class="change">${change(s.change)}</span>${rsi(s.rsi)}${score(s.score)}</div><div class="detail" id="detail-${id}">${detail(s)}</div>`}
function filtered(){const q=$('#search').value.trim().toLowerCase();return q?records.filter(s=>(s.code+s.name).toLowerCase().includes(q)):records}function groupBy(data,key){return data.reduce((out,item)=>{const k=key(item);(out[k]??=[]).push(item);return out},{})}
function renderCards(data){const ranges=[['50 元以下',0,50],['50～100 元',50,100],['100～200 元',100,200],['200～500 元',200,500],['500～1000 元',500,1000],['1000 元以上',1000,Infinity]];let groups=view==='price'?Object.fromEntries(ranges.map(([label,min,max])=>[label,data.filter(s=>s.price>=min&&s.price<max)]).filter(([,x])=>x.length)):groupBy(data,s=>s.industry||'未分類');return `<div class="grid">${Object.entries(groups).sort((a,b)=>b[1].length-a[1].length).map(([title,list])=>`<section class="card"><div class="card-head"><span>${esc(title)}</span><span class="badge">${list.length} 檔</span></div>${list.map(row).join('')}</section>`).join('')}</div>`}
function renderTable(data){const columns=[['code','代號'],['name','名稱'],['price','收盤價'],['change','漲跌幅'],['rsi','RSI'],['adx','ADX'],['score','分數']];const sorted=[...data].sort((a,b)=>(a[sort]>b[sort]?1:a[sort]<b[sort]?-1:0)*(asc?1:-1));return `<div class="table-wrap"><table><thead><tr>${columns.map(([key,label])=>`<th data-sort="${key}">${label}${sort===key?(asc?' ▲':' ▼'):''}</th>`).join('')}</tr></thead><tbody>${sorted.map((s,i)=>{const id=idOf(s,i);return `<tr class="data-row ${s.hot?'hot-row':''}" data-id="${id}"><td class="code">${esc(s.code)}</td><td>${s.hot?'⚡ ':''}${esc(s.name)}</td><td class="price">${Number(s.price).toFixed(2)}</td><td>${change(s.change)}</td><td>${rsi(s.rsi)}</td><td>${Number(s.adx).toFixed(1)}</td><td>${score(s.score)}</td></tr><tr><td colspan="7" style="padding:0"><div class="detail" id="detail-${id}">${detail(s)}</div></td></tr>`}).join('')}</tbody></table></div>`}
function renderHot(){const hot=records.filter(s=>s.hot),box=$('#hot');if(!hot.length){box.innerHTML='';return}box.innerHTML=`<div class="hot-title">⚡ 熱門突破 <span class="badge">${hot.length} 檔</span><small>量能放大、突破前高且股價低於 50 元</small></div><div class="hot-grid">${hot.map((s,i)=>`<article class="hot-card" data-id="hot-${i}"><div class="code">${esc(s.code)}</div><div class="name">${esc(s.name)}</div><span class="price">${Number(s.price).toFixed(2)}</span>　${change(s.change)} ${score(s.score)}<div class="detail" id="detail-hot-${i}">${detail(s)}</div></article>`).join('')}</div>`}
function render(){const data=filtered();$('#app').innerHTML=data.length?(view==='table'?renderTable(data):renderCards(data)):'<div class="empty">找不到符合的股票</div>';document.querySelectorAll('[data-id]').forEach(el=>el.addEventListener('click',e=>{if(e.target.closest('a'))return;const panel=$('#detail-'+el.dataset.id);if(panel)panel.classList.toggle('open')}));document.querySelectorAll('[data-sort]').forEach(el=>el.addEventListener('click',()=>{asc=sort===el.dataset.sort?!asc:false;sort=el.dataset.sort;render()}))}
function load(){records=ALL_DATA[$('#date').value]||[];records.sort((a,b)=>b.score-a.score);$('#count').innerHTML=`共 <b>${records.length}</b> 檔訊號`;renderHot();render()}const dates=Object.keys(ALL_DATA).sort().reverse();$('#date').innerHTML=dates.map(d=>`<option>${d}</option>`).join('');$('#updated').textContent=dates[0]||'尚無資料';$('#date').addEventListener('change',load);$('#search').addEventListener('input',render);document.querySelectorAll('.tabs button').forEach(b=>b.addEventListener('click',()=>{view=b.dataset.view;document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('active',x===b));render()}));load();
</script></body></html>
