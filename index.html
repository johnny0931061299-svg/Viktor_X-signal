<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viktor-X 台股訊號系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1a2234; --border:#1e2d45;
    --accent:#3b82f6; --accent-glow:rgba(59,130,246,0.15);
    --green:#10b981; --green-dim:rgba(16,185,129,0.12);
    --red:#ef4444; --red-dim:rgba(239,68,68,0.12);
    --text:#e2e8f0; --text-dim:#64748b;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; padding-bottom:60px; }
  header { border-bottom:1px solid var(--border); padding:18px 32px; display:flex; align-items:center; gap:14px; background:var(--surface); position:sticky; top:0; z-index:10; }
  .logo-dot { width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent); animation:pulse 2s infinite; flex-shrink:0; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
  header h1 { font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:500; letter-spacing:.1em; }
  header h1 span { color:var(--accent); }
  .header-right { margin-left:auto; font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; }
  .container { max-width:1140px; margin:0 auto; padding:28px 20px 0; }
  .controls { display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
  .ctrl-label { font-size:11px; color:var(--text-dim); letter-spacing:.07em; text-transform:uppercase; }
  select { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:6px; font-size:13px; font-family:'JetBrains Mono',monospace; cursor:pointer; outline:none; transition:border-color .2s; }
  select:hover,select:focus { border-color:var(--accent); }
  .signal-count { margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text-dim); }
  .signal-count strong { color:var(--green); font-size:20px; margin-right:2px; }
  .search-bar { width:100%; margin-bottom:16px; }
  .search-bar input {
    width:100%; padding:10px 16px;
    background:var(--surface); border:1px solid var(--border);
    color:var(--text); border-radius:6px; font-size:13px;
    font-family:'Inter',sans-serif; outline:none; transition:border-color .2s;
  }
  .search-bar input:focus { border-color:var(--accent); }
  .search-bar input::placeholder { color:var(--text-dim); }
  .view-toggle { display:flex; gap:6px; margin-bottom:20px; }
  .toggle-btn { padding:7px 16px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-size:12px; cursor:pointer; transition:all .2s; }
  .toggle-btn:hover { border-color:var(--accent); color:var(--text); }
  .toggle-btn.active { background:var(--accent-glow); border-color:var(--accent); color:var(--accent); }
  .category-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:14px; }
  .category-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; transition:border-color .2s; }
  .category-card:hover { border-color:rgba(59,130,246,.4); }
  .category-header { padding:11px 16px; background:var(--surface2); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .category-name { font-size:12px; font-weight:600; color:var(--text); }
  .category-badge { font-family:'JetBrains Mono',monospace; font-size:11px; padding:2px 8px; border-radius:20px; background:var(--green-dim); color:var(--green); }
  .stock-row { display:flex; align-items:center; padding:9px 16px; border-bottom:1px solid var(--border); gap:8px; transition:background .12s; }
  .stock-row:last-child { border-bottom:none; }
  .stock-row:hover { background:var(--surface2); }
  .stock-code { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:var(--accent); width:44px; flex-shrink:0; }
  .stock-name { font-size:13px; color:var(--text); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .stock-price { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--green); width:50px; text-align:right; flex-shrink:0; }
  .stock-change { font-family:'JetBrains Mono',monospace; font-size:11px; width:54px; text-align:right; flex-shrink:0; }
  .up { color:var(--green); }
  .dn { color:var(--red); }
  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  thead th { padding:11px 16px; text-align:left; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); background:var(--surface2); border-bottom:1px solid var(--border); font-weight:600; cursor:pointer; user-select:none; }
  thead th:hover { color:var(--text); }
  tbody tr { border-bottom:1px solid var(--border); transition:background .12s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--surface2); }
  tbody td { padding:10px 16px; font-size:13px; }
  td.code { font-family:'JetBrains Mono',monospace; color:var(--accent); font-weight:600; font-size:12px; }
  td.price { font-family:'JetBrains Mono',monospace; color:var(--green); font-size:12px; }
  td.chg { font-family:'JetBrains Mono',monospace; font-size:12px; }
  td.vol { font-family:'JetBrains Mono',monospace; color:var(--text-dim); font-size:11px; }
  td.ind { font-size:11px; color:var(--text-dim); }
  .state-box { text-align:center; padding:64px 20px; color:var(--text-dim); font-size:14px; }
  .state-box .icon { font-size:36px; margin-bottom:14px; }
  a.tv-link { color:var(--accent); text-decoration:none; }
  a.tv-link:hover { text-decoration:underline; }
</style>
</head>

  <div id="mainContent"></div>
</div>

}

function init() {
  const dates=Object.keys(ALL_DATA).sort((a,b)=>b.localeCompare(a));
  document.getElementById('dateSelect').innerHTML=dates.map(d=>`<option value="${d}">${d}</option>`).join('');
  document.getElementById('lastUpdate').textContent='更新至 '+dates[0];
  loadDate();
}

function loadDate() {
  document.getElementById('searchInput').value='';
  const date=document.getElementById('dateSelect').value;
  currentData=ALL_DATA[date]||[];
  if(!currentData.length) {
    document.getElementById('mainContent').innerHTML='<div class="state-box"><div class="icon">📭</div>當日無訊號股票</div>';
    document.getElementById('signalCount').innerHTML='<span style="color:var(--text-dim)">無訊號</span>';
    return;
  }
  document.getElementById('signalCount').innerHTML=`共 <strong>${currentData.length}</strong> 支有訊號`;
  renderView();
}

function setView(v) {
  currentView=v;
  ['price','industry','table'].forEach(k=>document.getElementById('btn-'+k).classList.toggle('active',k===v));
  if(currentData.length) renderView();
}

function renderView() {
  if(currentView==='price') renderByPrice();
  if(currentView==='industry') renderByIndustry();
  if(currentView==='table') renderTable();
}

function renderByPrice() {
  const data = getFiltered();
  const groups=PRICE_RANGES.map(r=>({...r,stocks:data.filter(s=>s.price>=r.min&&s.price<r.max)})).filter(g=>g.stocks.length);
  if (!groups.length) { document.getElementById('mainContent').innerHTML='<div class="state-box"><div class="icon">🔍</div>找不到符合的股票</div>'; return; }
  document.getElementById('mainContent').innerHTML='<div class="category-grid">'+groups.map(g=>
    `<div class="category-card"><div class="category-header"><span class="category-name">${g.label}</span><span class="category-badge">${g.stocks.length} 支</span></div>`+
    g.stocks.map(s=>
      `<div class="stock-row">
        <span class="stock-code"><a class="tv-link" href="https://www.tradingview.com/chart/?symbol=TWSE:${s.code}" target="_blank">${s.code}</a></span>
        <span class="stock-name">${s.name}</span>
        <span class="stock-price">${s.price.toFixed(1)}</span>
        <span class="stock-change">${chgHtml(s.change)}</span>
      </div>`).join('')+
    '</div>').join('')+'</div>';
}

function renderByIndustry() {
  const data = getFiltered();
  const map={};
  data.forEach(s=>{const i=s.industry||'未分類';if(!map[i])map[i]=[];map[i].push(s);});
  const groups=Object.entries(map).sort((a,b)=>b[1].length-a[1].length);
  if (!groups.length) { document.getElementById('mainContent').innerHTML='<div class="state-box"><div class="icon">🔍</div>找不到符合的股票</div>'; return; }
  document.getElementById('mainContent').innerHTML='<div class="category-grid">'+groups.map(([ind,stocks])=>
    `<div class="category-card"><div class="category-header"><span class="category-name">${ind}</span><span class="category-badge">${stocks.length} 支</span></div>`+
    stocks.map(s=>
      `<div class="stock-row">
        <span class="stock-code"><a class="tv-link" href="https://www.tradingview.com/chart/?symbol=TWSE:${s.code}" target="_blank">${s.code}</a></span>
        <span class="stock-name">${s.name}</span>
        <span class="stock-price">${s.price.toFixed(1)}</span>
        <span class="stock-change">${chgHtml(s.change)}</span>
      </div>`).join('')+
    '</div>').join('')+'</div>';
}

function renderTable(col) {
  const data = getFiltered();
  if (col) { sortAsc = sortCol===col ? !sortAsc : true; sortCol=col; }
  const sorted=[...data].sort((a,b)=>{
    let va=a[sortCol||'price'], vb=b[sortCol||'price'];
    if (typeof va==='string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va-vb : vb-va;
  });
  if (!sorted.length) { document.getElementById('mainContent').innerHTML='<div class="state-box"><div class="icon">🔍</div>找不到符合的股票</div>'; return; }
  const arrow = k => sortCol===k ? (sortAsc?' ▲':' ▼') : '';
  document.getElementById('mainContent').innerHTML=
    `<div class="table-wrap"><table>
      <thead><tr>
        <th onclick="renderTable('code')">代號${arrow('code')}</th>
        <th>名稱</th>
        <th onclick="renderTable('industry')">產業${arrow('industry')}</th>
        <th onclick="renderTable('price')">收盤價${arrow('price')}</th>
        <th onclick="renderTable('change')">漲跌幅${arrow('change')}</th>
        <th onclick="renderTable('volume')">成交量${arrow('volume')}</th>
      </tr></thead><tbody>`+
    sorted.map(s=>
      `<tr>
        <td class="code"><a class="tv-link" href="https://www.tradingview.com/chart/?symbol=TWSE:${s.code}" target="_blank">${s.code}</a></td>
        <td>${s.name}</td>
        <td class="ind">${s.industry||'-'}</td>
        <td class="price">${s.price.toFixed(1)}</td>
        <td class="chg">${chgHtml(s.change)}</td>
        <td class="vol">${fmtVol(s.volume)}</td>
      </tr>`).join('')+
    '</tbody></table></div>';
}
init();
</script>
</body>
</html>
